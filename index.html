<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="بوابة سريعة تجمع روابط المنصات الإلكترونية لكلية الشريعة والأنظمة بجامعة الطائف."
    />
    <title>منصات كلية الشريعة والأنظمة</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-labelledby="page-title">
      <header class="page-header">
        <span class="eyebrow">جامعة الطائف</span>
        <h1 id="page-title">منصات كلية الشريعة والأنظمة</h1>
        <p class="lede">روابط منصات الكلية في صفحة واحدة</p>
      </header>

      <section class="orbits" aria-label="قائمة المنصات">
        <a
          class="orbit orbit-activity"
          href="https://faculty-activities.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="orbit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 19V5h14v14H5Z" />
              <path d="M8 9h8M8 13h8M8 17h5" />
            </svg>
          </span>
          <span class="orbit-title">النشاط العلمي للأعضاء</span>
          <span class="orbit-sub">الأبحاث والمشاركات</span>
        </a>

        <a
          class="orbit orbit-kpi"
          href="https://kpishare3h.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="orbit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 20h16" />
              <path d="M8 17v-7M12 17V5M16 17v-4" />
              <path d="m7 9 4-3 4 4 4-6" />
            </svg>
          </span>
          <span class="orbit-title">مؤشرات الأداء</span>
          <span class="orbit-sub">متابعة مؤشرات الجودة</span>
        </a>

        <a
          class="orbit orbit-courses"
          href="https://courseofshar3ah.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="orbit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6 4h12v16H6z" />
              <path d="M9 8h6M9 12h6M9 16h4" />
            </svg>
          </span>
          <span class="orbit-title">الخطط والمقررات</span>
          <span class="orbit-sub">الخطط وتوصيفات المقررات</span>
        </a>

        <a
          class="orbit orbit-calendar"
          href="https://conferences-calendar.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="orbit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 6h14v14H5z" />
              <path d="M5 10h14M8 3v5M16 3v5" />
            </svg>
          </span>
          <span class="orbit-title">الفعاليات والمؤتمرات</span>
          <span class="orbit-sub">المؤتمرات القريبة</span>
        </a>

        <a
          class="orbit orbit-surveys"
          href="https://shari3ahsurveys.netlify.app/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="orbit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M5 5h14v10H9l-4 4V5Z" />
              <path d="M8 9h8M8 12h5" />
            </svg>
          </span>
          <span class="orbit-title">الاستطلاعات والرأي</span>
          <span class="orbit-sub">الاستبانات وقياس الرأي</span>
        </a>
      </section>
    </main>
  </body>
</html>
